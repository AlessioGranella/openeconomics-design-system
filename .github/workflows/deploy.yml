name: Deploy design system to GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # serve tutta la storia + i tag

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1) Ultima versione (main) → root del sito
      - run: npm ci
      - run: npm run build
      - run: |
          rm -rf site && mkdir -p site
          cp -r dist/* site/

      # 2) Ogni release taggata → sottocartella /vX.Y.Z/
      #    (resiliente: una build vecchia che fallisce viene saltata, non rompe il deploy)
      - run: |
          for tag in $(git tag -l 'v*' | sort -V); do
            echo "::group::Build $tag"
            rm -rf ".ver/$tag"
            if git worktree add --detach ".ver/$tag" "$tag" \
               && ( cd ".ver/$tag" && npm ci && npm run build ); then
              mkdir -p "site/$tag"
              cp -r ".ver/$tag/dist/"* "site/$tag/"
            else
              echo "::warning::Build di $tag fallita — versione saltata"
            fi
            git worktree remove --force ".ver/$tag" 2>/dev/null || true
            echo "::endgroup::"
          done

      # 3) Indice delle versioni (solo quelle effettivamente costruite)
      - run: |
          latest=$(git tag -l 'v*' | sort -V | tail -1)
          built=$(ls -d site/v*/ 2>/dev/null | sed 's#site/##; s#/##' | sort -rV | jq -R . | jq -s -c .)
          printf '{"latest":"%s","versions":%s}\n' "$latest" "${built:-[]}" > site/versions.json
          echo "versions.json:" && cat site/versions.json

      # 4) Selettore di versione fluttuante: iniettato SOLO nelle versioni che
      #    NON hanno già il selettore integrato (gli snapshot vecchi), così da
      #    ogni versione si può comunque navigare verso le altre.
      - run: |
          cp .github/site/version-nav.js site/version-nav.js
          snippet='<script defer src="/openeconomics-design-system/version-nav.js"></script>'
          for f in $(find site -name index.html); do
            dir=$(dirname "$f")
            if grep -rqs "dx-version-select" "$dir"/assets/*.js; then
              echo "skip (selettore integrato) → $f"
            elif grep -q "version-nav.js" "$f"; then
              echo "già presente → $f"
            else
              sed -i "s#</body>#$snippet</body>#" "$f"
              echo "iniettato → $f"
            fi
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
