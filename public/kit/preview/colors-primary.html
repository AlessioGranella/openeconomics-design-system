<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #fff; padding: 24px; box-sizing: border-box; }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 700px;
  }
  .swatch {
    height: 230px;
    border-radius: var(--oe-radius-sm);
    padding: 18px 20px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--oe-font-mono);
    font-size: 13px;
    letter-spacing: -0.01em;
    box-sizing: border-box;
  }
  .name { font-family: var(--oe-font-sans); font-weight: 600; font-size: 24px; letter-spacing: -0.01em; }
  .meta { display: flex; flex-direction: column; gap: 2px; }
  .label { opacity: 0.7; }
  .hex { text-transform: uppercase; }
  .bluette { background: var(--oe-bluette-700); color: var(--oe-lime-400); }
  .lime { background: var(--oe-lime-400); color: var(--oe-bluette-700); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch bluette">
    <div>
      <div class="name">Bluette</div>
      <div class="label">Core identity · primary</div>
    </div>
    <div class="meta">
      <div class="hex">#4400B3</div>
      <div class="label">68 / 0 / 179 · 91/89/0/0</div>
    </div>
  </div>
  <div class="swatch lime">
    <div>
      <div class="name">Lime</div>
      <div class="label">Electric accent · primary</div>
    </div>
    <div class="meta">
      <div class="hex">#B9FF69</div>
      <div class="label">185 / 255 / 105 · 35/0/77/0</div>
    </div>
  </div>
</div>
</body>
</html>
