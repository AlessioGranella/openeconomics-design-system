<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #fff; padding: 24px 28px; box-sizing: border-box; }
  .meta {
    font-family: var(--oe-font-mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--oe-gray-500);
    margin-bottom: 18px;
  }
  .row { display: flex; gap: 32px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box {
    width: 110px; height: 90px;
    background: var(--oe-bluette-700);
    border: 1px solid var(--oe-bluette-900);
  }
  .name { font-family: var(--oe-font-sans); font-size: 13px; font-weight: 500; }
  .val { font-family: var(--oe-font-mono); font-size: 12px; color: var(--oe-gray-500); }
</style>
</head>
<body>
<div class="meta">Radii · 0 px — sharp corners across the system</div>
<div class="row">
  <div class="item"><div class="box" style="border-radius:0"></div><div class="name">Buttons</div><div class="val">0 · CTA</div></div>
  <div class="item"><div class="box" style="border-radius:0"></div><div class="name">Chips</div><div class="val">0 · tags</div></div>
  <div class="item"><div class="box" style="border-radius:0"></div><div class="name">Cards</div><div class="val">0 · panels</div></div>
  <div class="item"><div class="box" style="border-radius:0"></div><div class="name">Photos</div><div class="val">0 · media</div></div>
</div>
</body>
</html>
