<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--oe-gray-100); padding: 24px; box-sizing: border-box; }
  .strip {
    width: 700px;
    background: #fff;
    padding: 36px 28px;
    display: flex; align-items: center; justify-content: space-around;
    gap: 32px;
    border-top: 1px solid var(--oe-gray-200);
    border-bottom: 1px solid var(--oe-gray-200);
    box-sizing: border-box;
  }
  .strip span {
    font-family: var(--oe-font-serif);
    font-size: 22px;
    color: var(--oe-black);
    letter-spacing: 0.01em;
  }
  .strip .b { font-weight: 700; }
  .meta {
    font-family: var(--oe-font-mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--oe-gray-500);
    margin-bottom: 14px;
  }
</style>
</head>
<body>
<div class="meta">Client logo strip · monochrome · gray-200 top + bottom</div>
<div class="strip">
  <span class="b">FIFA</span>
  <span>Terna</span>
  <span style="font-style: italic; font-family: 'Hedvig Letters Serif'">Muzinich&amp;Co</span>
  <span class="b">SNAM</span>
  <span style="letter-spacing: 0.15em">FIT</span>
  <span>Enel</span>
</div>
</body>
</html>
