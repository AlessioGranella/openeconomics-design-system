<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #E7E7E7; font-family: "Atkinson Hyperlegible Next", system-ui, sans-serif; padding: 16px; }
  .sec-lbl { font-family: "Atkinson Hyperlegible Mono", monospace; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #545454; margin-bottom: 8px; }
  .table-kpi { background: #fff; width: 660px; border: 1px solid #E7E7E7; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #F1F1F1; font-size: 12px; font-weight: 600; text-align: right; padding: 7px 9px; border-right: 1px solid #E7E7E7; border-bottom: 2px solid #E7E7E7; }
  th:first-child { text-align: left; width: 120px; }
  th:nth-child(2) { width: 100px; }
  .cat td { background: #EFE5FF; font-size: 12px; font-weight: 600; color: #4400B3; text-transform: uppercase; letter-spacing: 0.04em; padding: 5px 9px; border-bottom: 1px solid #D9C1FF; }
  td { font-size: 12px; padding: 6px 9px; border-right: 1px solid #E7E7E7; border-bottom: 1px solid #F1F1F1; color: #2C2C2C; text-align: right; vertical-align: middle; }
  td:first-child { text-align: left; font-size: 12px; }
  td:nth-child(2) { font-weight: 600; font-variant-numeric: tabular-nums; }
  .inp { width: 68px; height: 24px; border: 1px solid #D2D2D2; background: #F9F9FF; padding: 0 5px; font-family: inherit; font-size: 12px; color: #000; text-align: right; font-variant-numeric: tabular-nums; }
  .inp:focus { outline: none; border-color: #4400B3; }
  .actions { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; background: #F1F1F1; border-top: 1px solid #E7E7E7; }
  .btn-ins { height: 30px; padding: 0 12px; background: #4400B3; color: #fff; border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; }
  .btn-clr { font-size: 12px; color: #CC0000; background: none; border: none; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div class="sec-lbl">TABELLA 3 · KPI con input per anno</div>
<div class="table-kpi">
  <table>
    <thead><tr><th>KPI</th><th>Valore</th><th>2025</th><th>2026</th><th>2027</th><th>2028</th></tr></thead>
    <tbody>
      <tr class="cat"><td colspan="6">Risparmio ambientale</td></tr>
      <tr>
        <td>Migliore qualità rifiuti</td><td>509.000.999 €</td>
        <td><input class="inp" value="0,00"></td><td><input class="inp" value="0,00"></td>
        <td><input class="inp" value="0,00"></td><td><input class="inp" value="0,00"></td>
      </tr>
      <tr>
        <td>Fattore Risparmio Amb.</td><td>509.000.999 €</td>
        <td><input class="inp" value="0,00"></td><td><input class="inp" value="0,00"></td>
        <td><input class="inp" value="0,00"></td><td><input class="inp" value="0,00"></td>
      </tr>
      <tr class="cat"><td colspan="6">Maggiore introito da TARI</td></tr>
      <tr>
        <td>Numero nuovi paganti</td><td>509.000.999 €</td>
        <td><input class="inp" value="0,00"></td><td><input class="inp" value="0,00"></td>
        <td><input class="inp" value="0,00"></td><td><input class="inp" value="0,00"></td>
      </tr>
    </tbody>
  </table>
  <div class="actions">
    <button class="btn-ins">Inserisci automaticamente sugli anni</button>
    <button class="btn-clr">Pulisci la distribuzione ✕</button>
  </div>
</div>
</body>
</html>
