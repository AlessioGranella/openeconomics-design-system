<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #fff; padding: 28px 32px; box-sizing: border-box; }
  .meta {
    font-family: var(--oe-font-mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--oe-gray-500);
    margin-bottom: 12px;
  }
  .specimen {
    font-family: var(--oe-font-serif);
    font-size: 64px;
    line-height: 1.05;
    letter-spacing: -0.005em;
    color: var(--oe-black);
    text-wrap: balance;
    max-width: 640px;
  }
</style>
</head>
<body>
<div class="meta">Display · Hedvig Letters Serif · 64px / 1.05</div>
<div class="specimen">Mitigate risks,<br>adapt with confidence</div>
</body>
</html>
