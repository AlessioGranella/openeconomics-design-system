<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #F1F1F1; font-family: "Atkinson Hyperlegible Next", system-ui, sans-serif; padding: 20px; }
  .wrap { display: flex; gap: 20px; align-items: flex-start; width: 660px; }

  /* Top nav */
  .topnav { width: 660px; height: 52px; background: #fff; border-bottom: 4px solid #B9FF69; display: flex; align-items: center; padding: 0 16px; gap: 12px; margin-bottom: 16px; }
  .topnav img { height: 18px; }
  .search-mock { flex:1; max-width: 220px; height: 32px; background: #F1F1F1; border: 1px solid #E7E7E7; display: flex; align-items: center; gap: 6px; padding: 0 10px; }
  .search-mock svg { width: 13px; height: 13px; fill: none; stroke: #999; stroke-width: 1.8; stroke-linecap: round; }
  .search-mock span { font-size: 12px; color: #999; }
  .spacer { flex: 1; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: #4400B3; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0; }

  /* Nav */
  .nav { background: #fff; border: 1px solid #E7E7E7; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
  .nav.collapsed { width: 64px; }
  .nav.expanded  { width: 200px; flex: 1; }
  .nav-body { flex: 1; }

  /* Nav item */
  .item {
    display: flex; align-items: center; gap: 10px;
    height: 52px; padding: 0 0 0 12px;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: background 0.1s;
  }
  .item .ic { display: flex; align-items: center; justify-content: center; flex-shrink: 0; width: 20px; }
  .item .ic svg { width: 18px; height: 18px; fill: none; stroke: #2C2C2C; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .item .lbl { font-size: 13px; font-weight: 400; color: #2C2C2C; white-space: nowrap; }

  /* States */
  .item.s-default  { background: #fff; border-left-color: transparent; }
  .item.s-hover    { background: #F1F1F1; border-left-color: transparent; }
  .item.s-active   { background: #fff; border-left-color: #4400B3; }
  .item.s-active .ic svg { stroke: #4400B3; }
  .item.s-active .lbl   { color: #4400B3; font-weight: 500; }
  .item.s-focus    { background: #EFE5FF; border-left-color: transparent; outline: 2px solid #4400B3; outline-offset: -2px; }
  .item.s-disabled { background: #fff; opacity: 0.38; cursor: not-allowed; }

  /* Hover interactivity */
  .item.interactive:hover { background: #F1F1F1; }
  .item.interactive:active { background: #EFE5FF; }

  /* Section label */
  .section-lbl { font-size: 12px; font-weight: 400; color: #6E6E6E; text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 12px 4px; border-top: 2px solid #E7E7E7; margin-top: 2px; }
  .resize { height: 44px; border-top: 1px solid #E7E7E7; display: flex; align-items: center; padding: 0 12px; gap: 8px; color: #6E6E6E; font-size: 12px; cursor: pointer; }
  .resize:hover { background: #F1F1F1; }
  .resize svg { width: 15px; height: 15px; fill: none; stroke: #6E6E6E; stroke-width: 1.8; stroke-linecap: round; }

  /* State labels column */
  .states { display: flex; flex-direction: column; gap: 0; }
  .state-tag { height: 52px; display: flex; align-items: center; font-size: 12px; color: #999; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
  .state-tag.section-spacer { height: 36px; }

  /* collapsed icons column labels */
  .col-collapsed .item { justify-content: center; padding: 0; }
</style>
</head>
<body>

<!-- Top nav -->
<div class="topnav">
  <img src="../assets/logo-black.svg" alt="OE">
  <div class="search-mock">
    <svg viewBox="0 0 24 24"><path d="M11 17.25a6.25 6.25 0 1 1 0-12.5 6.25 6.25 0 0 1 0 12.5z"/><path d="M16 16l4.5 4.5"/></svg>
    <span>Cerca...</span>
  </div>
  <div class="spacer"></div>
  <div class="avatar">MR</div>
</div>

<div class="wrap">

  <!-- State labels -->
  <div class="states">
    <div class="state-tag" style="height:52px;color:#B9FF69;background:#270065;padding:0 8px;font-size: 12px">TOP NAV</div>
    <div class="state-tag">Default</div>
    <div class="state-tag">Hover</div>
    <div class="state-tag">Active</div>
    <div class="state-tag">Focus</div>
    <div class="state-tag">Disabled</div>
    <div class="state-tag section-spacer"></div>
    <div class="state-tag">Default</div>
    <div class="state-tag">Hover</div>
    <div class="state-tag">Active</div>
  </div>

  <!-- Collapsed nav (icon only) -->
  <div class="nav collapsed col-collapsed">
    <div class="nav-body">
      <div class="item s-default">
        <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>
      </div>
      <div class="item s-hover">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
      </div>
      <div class="item s-active">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg></div>
      </div>
      <div class="item s-focus">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
      </div>
      <div class="item s-disabled">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
      </div>
      <div style="height:2px;background:#E7E7E7;margin:2px 0"></div>
      <div class="item s-default interactive">
        <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
      </div>
      <div class="item s-hover interactive">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></div>
      </div>
      <div class="item s-active interactive">
        <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>
      </div>
    </div>
    <div class="resize">
      <svg viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
    </div>
  </div>

  <!-- Expanded nav (icon + label) -->
  <div class="nav expanded">
    <div class="nav-body">
      <div class="item s-default">
        <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>
        <span class="lbl">Dashboard</span>
      </div>
      <div class="item s-hover">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
        <span class="lbl">Data Room</span>
      </div>
      <div class="item s-active">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg></div>
        <span class="lbl">Valutazione</span>
      </div>
      <div class="item s-focus">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
        <span class="lbl">Composing</span>
      </div>
      <div class="item s-disabled">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
        <span class="lbl">Progetti</span>
      </div>
      <div class="section-lbl">SEZIONE</div>
      <div class="item s-default interactive">
        <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 4 0h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
        <span class="lbl">Impostazioni ↕ hover</span>
      </div>
      <div class="item s-hover interactive">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></div>
        <span class="lbl">Log out ↕ hover</span>
      </div>
      <div class="item s-active interactive">
        <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>
        <span class="lbl">Click per attivare</span>
      </div>
    </div>
    <div class="resize">
      <svg viewBox="0 0 24 24"><path d="M9 3H3v6"/><path d="M15 21h6v-6"/><path d="M3 3l7 7"/><path d="M21 21l-7-7"/></svg>
      <span>Comprimi</span>
    </div>
  </div>

</div>
</body>
</html>
