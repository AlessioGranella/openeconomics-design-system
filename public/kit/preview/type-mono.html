<!-- @dsCard group="Type" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #fff; padding: 28px 32px; box-sizing: border-box; }
  .meta {
    font-family: var(--oe-font-sans);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--oe-gray-500);
    margin-bottom: 18px;
  }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .label {
    font-family: var(--oe-font-sans);
    font-size: 12px;
    color: var(--oe-gray-600);
    margin-bottom: 12px;
  }
  .chip-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .chip {
    height: 31px;
    display: inline-flex; align-items: center;
    padding: 0 16px;
    background: var(--oe-lime-400);
    color: var(--oe-bluette-700);
    font-family: var(--oe-font-mono);
    font-weight: 500;
    font-size: 16px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  .chip.alt { background: var(--oe-bluette-050); }
  .figlabels { display: flex; flex-direction: column; gap: 10px; }
  .fig {
    font-family: var(--oe-font-mono);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--oe-black);
  }
</style>
</head>
<body>
<div class="meta">Mono · Atkinson Hyperlegible Mono · two permitted uses only</div>
<div class="cols">
  <div>
    <div class="label">1 · Chip / category text — Medium 500, 16px</div>
    <div class="chip-row">
      <div class="chip">FLAGSHIP ANALYSIS</div>
      <div class="chip alt">PUBLIC FUNDING</div>
    </div>
  </div>
  <div>
    <div class="label">2 · Figure numbering — Medium 500, 12px, uppercase, black</div>
    <div class="figlabels">
      <div class="fig">GRAFICO 1</div>
      <div class="fig">TABELLA 1</div>
      <div class="fig">MAPPA 1</div>
    </div>
  </div>
</div>
</body>
</html>
