<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #fff; }
  .card {
    width: 700px; height: 280px;
    background: var(--oe-bluette-900);
    color: #fff;
    padding: 40px 48px;
    box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: center; gap: 24px;
    border-radius: 0;
  }
  .slogan {
    font-family: var(--oe-font-serif);
    font-size: 36px;
    line-height: 1.1;
    letter-spacing: -0.005em;
    text-wrap: balance;
    max-width: 580px;
  }
  .src {
    font-family: var(--oe-font-mono);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: var(--oe-bluette-200);
  }
</style>
</head>
<body>
<div class="card">
  <div class="src">— Footer slogan</div>
  <div class="slogan">Enabling adaptation. Empowering impact.<br>With platforms, strategy, and trust.</div>
</div>
</body>
</html>
