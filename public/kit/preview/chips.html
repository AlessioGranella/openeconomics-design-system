<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #fff; padding: 28px; box-sizing: border-box; }
  .meta {
    font-family: var(--oe-font-mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--oe-gray-500);
    margin-bottom: 18px;
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .chip {
    display: inline-flex; align-items: center; gap: 10px;
    height: 31px;
    padding: 0 16px;
    border-radius: 0;
    font-family: var(--oe-font-mono);
    font-weight: 500;
    font-size: 16px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  .lime { background: var(--oe-lime-400); color: var(--oe-bluette-700); }
  .soft { background: var(--oe-bluette-050); color: var(--oe-bluette-700); }
  .bluette { background: var(--oe-bluette-700); color: #fff; }
  .ghost { background: transparent; color: var(--oe-bluette-700); border: 1px solid var(--oe-bluette-700); }
</style>
</head>
<body>
<div class="meta">Category chips — eyebrow tags on cards & sections</div>
<div class="row">
  <div class="chip lime">FLAGSHIP ANALYSIS</div>
  <div class="chip soft">IMPACT ASSESSMENT</div>
  <div class="chip bluette">PUBLIC FUNDING</div>
  <div class="chip ghost">OPINION</div>
</div>
</body>
</html>
