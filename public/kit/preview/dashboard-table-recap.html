<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #E7E7E7; font-family: "Atkinson Hyperlegible Next", system-ui, sans-serif; padding: 16px; }
  .sec-lbl { font-family: "Atkinson Hyperlegible Mono", monospace; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #545454; margin-bottom: 8px; }
  .table { background: #fff; width: 360px; border: 1px solid #E7E7E7; }
  .row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 14px; border-bottom: 1px solid #F1F1F1; gap: 16px; }
  .row:last-of-type { border-bottom: none; }
  .lbl { font-size: 12px; color: #545454; flex: 1; }
  .val { font-size: 13px; font-weight: 700; color: #000; white-space: nowrap; }
  .note { font-size: 12px; color: #6E6E6E; padding: 8px 14px; border-top: 1px solid #E7E7E7; font-style: italic; }
</style>
</head>
<body>
<div class="sec-lbl">TABELLA 4 · Riepilogo (label + valore bold)</div>
<div class="table">
  <div class="row"><span class="lbl">Lorem Ipsum dolor sit amet</span><span class="val">Lorem Ipsum</span></div>
  <div class="row"><span class="lbl">Lorem Ipsum dolor sit</span><span class="val">Lorem Ipsum</span></div>
  <div class="row"><span class="lbl">Lorem Ipsum dolor sit</span><span class="val">Lorem Ipsum</span></div>
  <div class="row"><span class="lbl">Lorem Ipsum dolor sit</span><span class="val">Lorem Ipsum</span></div>
  <div class="row"><span class="lbl">Lorem Ipsum dolor sit</span><span class="val">Lorem Ipsum</span></div>
  <div class="note">Lorem Ipsum dolor sit amet consectetur. Dui sed ac anim amet sit volutpat arcu.</div>
</div>
</body>
</html>
