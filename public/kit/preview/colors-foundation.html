<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #fff; padding: 24px; box-sizing: border-box; }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 700px;
  }
  .swatch {
    height: 200px;
    border-radius: var(--oe-radius-sm);
    padding: 18px 20px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--oe-font-mono);
    font-size: 13px;
    letter-spacing: -0.01em;
    box-sizing: border-box;
  }
  .name { font-family: var(--oe-font-sans); font-weight: 600; font-size: 22px; letter-spacing: -0.01em; }
  .label { opacity: 0.7; }
  .hex { text-transform: uppercase; }
  .white { background: #fff; color: var(--oe-black); border: 1px solid var(--oe-gray-200); }
  .black { background: var(--oe-black); color: #fff; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch white">
    <div>
      <div class="name">White</div>
      <div class="label">Foundation · canvas</div>
    </div>
    <div>
      <div class="hex">#FFFFFF</div>
      <div class="label">255 / 255 / 255 · 0/0/0/0</div>
    </div>
  </div>
  <div class="swatch black">
    <div>
      <div class="name">Black</div>
      <div class="label">Foundation · structure</div>
    </div>
    <div>
      <div class="hex">#000000</div>
      <div class="label">0 / 0 / 0 · 0/0/0/100</div>
    </div>
  </div>
</div>
</body>
</html>
