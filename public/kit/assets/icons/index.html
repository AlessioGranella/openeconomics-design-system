<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenEconomics — Icon Archive</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #fff; color: #2C2C2C; font-family: var(--oe-font-sans); }
  .page { max-width: 1200px; margin: 0 auto; padding: 56px 48px 96px; }
  header.hd { margin-bottom: 8px; }
  .eyebrow { font-family: var(--oe-font-mono); font-weight: 500; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; color: #2C2C2C; }
  h1 { font-family: var(--oe-font-serif); font-weight: 400; font-size: 48px; line-height: 1.1; margin: 10px 0 14px; color: #2C2C2C; }
  .lede { font-family: var(--oe-font-sans); font-weight: 300; font-size: 18px; line-height: 1.4; max-width: 720px; color: #2C2C2C; margin: 0 0 28px; }

  /* toolbar */
  .toolbar { position: sticky; top: 0; z-index: 5; background: #fff; padding: 16px 0; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--oe-gray-200); margin-bottom: 8px; }
  .search { flex: 1; min-width: 220px; height: 44px; padding: 0 16px; border: 1px solid var(--oe-gray-300); background: var(--oe-gray-100); font-family: var(--oe-font-sans); font-size: 15px; color: #2C2C2C; }
  .search:focus { outline: none; border-color: var(--oe-bluette-700); background: #fff; }
  .count { font-family: var(--oe-font-sans); font-size: 13px; color: var(--oe-gray-600); white-space: nowrap; }

  section.group { margin-top: 44px; }
  .group-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .group-head h2 { font-family: var(--oe-font-sans); font-weight: 500; font-size: 20px; margin: 0; color: #2C2C2C; }
  .group-head .n { font-family: var(--oe-font-mono); font-size: 12px; color: var(--oe-gray-500); }
  .group-desc { font-family: var(--oe-font-sans); font-weight: 300; font-size: 14px; color: var(--oe-gray-600); margin: 0 0 20px; max-width: 640px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 16px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
  .tile { width: 100%; aspect-ratio: 1; background: var(--oe-gray-100); display: flex; align-items: center; justify-content: center; overflow: hidden; transition: outline-color .12s ease; outline: 1px solid transparent; }
  .cell:hover .tile { outline-color: var(--oe-bluette-700); }
  .tile img { width: 72px; height: 72px; display: block; }
  .cap { font-family: var(--oe-font-sans); font-size: 11px; line-height: 1.25; color: var(--oe-gray-700); text-align: center; word-break: break-word; }
  .cell.hidden { display: none; }
  .empty { font-family: var(--oe-font-sans); color: var(--oe-gray-500); font-size: 14px; padding: 8px 0; }

  /* copy toast */
  .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px); opacity: 0; background: var(--oe-bluette-900); color: var(--oe-lime-400); font-family: var(--oe-font-sans); font-weight: 500; font-size: 14px; padding: 14px 22px; pointer-events: none; transition: opacity .18s ease, transform .18s ease; z-index: 60; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* detail modal */
  .overlay { position: fixed; inset: 0; background: rgba(39,0,101,0.4); display: none; align-items: center; justify-content: center; z-index: 40; padding: 24px; }
  .overlay.show { display: flex; }
  .modal { background: #fff; width: 420px; max-width: 100%; padding: 0; box-shadow: 0 24px 60px rgba(39,0,101,0.28); }
  .modal-top { display: flex; gap: 20px; padding: 28px 28px 22px; align-items: center; border-bottom: 1px solid var(--oe-gray-200); }
  .modal-preview { width: 104px; height: 104px; flex-shrink: 0; background: var(--oe-gray-100); display: flex; align-items: center; justify-content: center; }
  .modal-preview img { width: 64px; height: 64px; }
  .modal-meta .mname { font-family: var(--oe-font-sans); font-weight: 500; font-size: 18px; color: #2C2C2C; margin: 0 0 6px; line-height: 1.2; }
  .modal-meta .mfile { font-family: var(--oe-font-mono); font-size: 12px; color: var(--oe-gray-600); word-break: break-all; }
  .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--oe-gray-200); }
  .modal-actions.single { grid-template-columns: 1fr; }
  .act { appearance: none; border: 0; background: #fff; padding: 16px 14px; cursor: pointer; font-family: var(--oe-font-sans); font-weight: 500; font-size: 14px; color: #2C2C2C; display: flex; align-items: center; justify-content: center; gap: 9px; transition: background .12s ease, color .12s ease; }
  .act:hover { background: var(--oe-bluette-700); color: var(--oe-lime-400); }
  .act svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .act .fmt { font-family: var(--oe-font-mono); font-size: 11px; opacity: .65; text-transform: uppercase; }
  .modal-close { width: 100%; appearance: none; border: 0; border-top: 1px solid var(--oe-gray-200); background: #fff; padding: 13px; cursor: pointer; font-family: var(--oe-font-sans); font-size: 13px; color: var(--oe-gray-600); }
  .modal-close:hover { color: #2C2C2C; }
</style>
</head>
<body>
<div class="page">
  <header class="hd">
    <div class="eyebrow">ICON ARCHIVE</div>
    <h1>Iconografia OpenEconomics</h1>
    <p class="lede">Set di icone del brand: pittogrammi a tinta piena su tile <strong>Bluette-900 (#270065)</strong> con glifo <strong>#F1F1F1</strong>. Clicca un'icona per scaricarla o copiarla in SVG o PNG.</p>
  </header>

  <div class="toolbar">
    <input class="search" id="q" type="text" placeholder="Cerca un'icona…" autocomplete="off">
    <div class="count" id="count"></div>
  </div>

  <div id="groups"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-top">
      <div class="modal-preview"><img id="mImg" src="" alt=""></div>
      <div class="modal-meta">
        <p class="mname" id="mName"></p>
        <div class="mfile" id="mFile"></div>
      </div>
    </div>
    <div class="modal-actions" id="mActions">
      <button class="act" data-do="copy-svg"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="1"></rect><path d="M5 15V5a1 1 0 0 1 1-1h10"></path></svg>Copia <span class="fmt">SVG</span></button>
      <button class="act" data-do="copy-png"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="1"></rect><path d="M5 15V5a1 1 0 0 1 1-1h10"></path></svg>Copia <span class="fmt">PNG</span></button>
      <button class="act" data-do="dl-svg"><svg viewBox="0 0 24 24"><path d="M12 4v11M7 11l5 5 5-5M5 20h14"></path></svg>Scarica <span class="fmt">SVG</span></button>
      <button class="act" data-do="dl-png"><svg viewBox="0 0 24 24"><path d="M12 4v11M7 11l5 5 5-5M5 20h14"></path></svg>Scarica <span class="fmt">PNG</span></button>
    </div>
    <button class="modal-close" id="mClose">Chiudi</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const BASE = ""; // icons sit beside this file
const GROUPS = [
  {
    id: "ui",
    title: "Interfaccia / UI",
    desc: "Icone di sistema in stile lineare (62×62) per controlli, contenitori e sezioni.",
    icons: ["activity","compare","maximize","minimize","minimize-1",
      "container","container-1","container-2","container-3","container-4","container-5","container-6",
      "icon-container","icon-container-1","icon-container-2","icon-container-3","icon-container-4",
      "feature-icon","feature-icon-1","feature-icon-2","feature-icon-3",
      "section-icon","section-icon-1","section-icon-2","section-icon-3"]
  },
  {
    id: "indicatori",
    title: "Indicatori economici",
    desc: "Metriche macro e d'impatto a glifo pieno, usate in grafici, mappe e schede dati.",
    icons: ["pil","gettito-fiscale","occupati","spesa","valore-della-produzione","redditi-delle-famiglie","progettazione",
      "2","3","4","5","6","7","8","9","14","15"]
  },
  {
    id: "servizi",
    title: "Servizi & prodotti",
    desc: "Icone tematiche per analisi, piattaforme e processi (suffisso “-1”).",
    icons: ["analisi-costi-benefici-1","analisi-esg-1","analisi-footprint-1","analisi-impatto-1",
      "pil-1","gettito-fiscale-1","occupati-1","spesa-1","valore-della-produzione-1","redditi-delle-famiglie-1","progettazione-1",
      "metriche-1","optimization-1","paper-1","roi-1","smart-intelligenza-1","sostieni-la-crescita-1","stack-1","time-1","trust-team-1","weak-communication-1","web-1",
      "candidature-1","composing-1","docfap-1","pianificazione-1","project-management-1","rendicontazione-1","scouting-1","valutazione-1",
      "data-room-bluette-backup-1","scenari-bluette-backup-1","osservatorio-atlas-1"]
  },
  {
    id: "valori",
    title: "Valori brand",
    desc: "Pittogrammi dei valori dell'azienda — tile #270065 con glifo #F1F1F1.",
    icons: ["specializzazione-estrema-bluette-lime","esperienza-comprovata-bluette-lime","risposte-concrete-bluette-lime","affidabilita-contesti-critici-bluette-lime","sostieni-la-crescita-bluette-700"]
  },
  {
    id: "scene",
    title: "Scene & concetti",
    desc: "Pittogrammi più narrativi per benefici, persone e situazioni.",
    icons: ["affiancamento","amministratori-locali","clima-disteso","crea-impatto","crea-impatto-1","crescita-veloce","finanziamenti","impara","lente-di-marketing","progetti-politica-ed-economia","resta-conforme","smart-working","spazio-crescita"]
  }
];

const label = s => s.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
const total = GROUPS.reduce((a, g) => a + g.icons.length, 0);
const groupsEl = document.getElementById("groups");
const countEl = document.getElementById("count");
countEl.textContent = total + " icone";

for (const g of GROUPS) {
  const sec = document.createElement("section");
  sec.className = "group";
  sec.dataset.group = g.id;
  sec.innerHTML = `
    <div class="group-head"><h2>${g.title}</h2><span class="n">${g.icons.length}</span></div>
    <p class="group-desc">${g.desc}</p>
    <div class="grid"></div>
    <div class="empty" style="display:none">Nessun risultato in questa categoria.</div>`;
  const grid = sec.querySelector(".grid");
  for (const name of g.icons) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.name = name;
    const path = BASE + name + ".svg";
    cell.innerHTML = `<div class="tile"><img src="${path}" alt="${name}" loading="lazy"></div><div class="cap">${label(name)}</div>`;
    cell.addEventListener("click", () => openModal(name));
    grid.appendChild(cell);
  }
  groupsEl.appendChild(sec);
}

const toast = document.getElementById("toast");
let toastT;
function flash(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => toast.classList.remove("show"), 1600);
}

/* ---- detail modal + export ---- */
const overlay = document.getElementById("overlay");
const mImg = document.getElementById("mImg");
const mName = document.getElementById("mName");
const mFile = document.getElementById("mFile");
const mActions = document.getElementById("mActions");
let current = null;

// hide "Copia PNG" if the browser can't write images to the clipboard
const canCopyPng = !!(navigator.clipboard && window.ClipboardItem);
if (!canCopyPng) {
  const b = mActions.querySelector('[data-do="copy-png"]');
  if (b) b.remove();
}

function openModal(name) {
  current = name;
  const path = name + ".svg";
  mImg.src = path;
  mName.textContent = label(name);
  mFile.textContent = "assets/icons/" + path;
  overlay.classList.add("show");
}
function closeModal() { overlay.classList.remove("show"); current = null; }

document.getElementById("mClose").addEventListener("click", closeModal);
overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

async function fetchSvg(name) {
  const res = await fetch(name + ".svg");
  return await res.text();
}

function download(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// rasterize an SVG string to a PNG Blob at a given size
function svgToPng(svgText, size = 512) {
  return new Promise((resolve, reject) => {
    const blob = new Blob([svgText], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(url);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error("toBlob failed")), "image/png");
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("img load failed")); };
    img.src = url;
  });
}

mActions.addEventListener("click", async e => {
  const btn = e.target.closest(".act");
  if (!btn || !current) return;
  const name = current;
  const action = btn.dataset.do;
  try {
    if (action === "copy-svg") {
      const svg = await fetchSvg(name);
      await navigator.clipboard.writeText(svg);
      flash("SVG copiato negli appunti");
    } else if (action === "dl-svg") {
      const svg = await fetchSvg(name);
      download(new Blob([svg], { type: "image/svg+xml" }), name + ".svg");
      flash("SVG scaricato");
    } else if (action === "dl-png") {
      const svg = await fetchSvg(name);
      const png = await svgToPng(svg, 512);
      download(png, name + ".png");
      flash("PNG scaricato (512\u00d7512)");
    } else if (action === "copy-png") {
      const svg = await fetchSvg(name);
      const png = await svgToPng(svg, 512);
      await navigator.clipboard.write([new ClipboardItem({ "image/png": png })]);
      flash("PNG copiato negli appunti");
    }
  } catch (err) {
    flash("Operazione non riuscita");
    console.error(err);
  }
});

const q = document.getElementById("q");
q.addEventListener("input", () => {
  const term = q.value.trim().toLowerCase();
  let shown = 0;
  document.querySelectorAll("section.group").forEach(sec => {
    let any = false;
    sec.querySelectorAll(".cell").forEach(c => {
      const match = c.dataset.name.includes(term);
      c.classList.toggle("hidden", !match);
      if (match) { any = true; shown++; }
    });
    sec.querySelector(".grid").style.display = any ? "" : "none";
    sec.querySelector(".empty").style.display = any ? "none" : "";
    sec.style.display = (term && !any) ? "none" : "";
  });
  countEl.textContent = term ? (shown + " di " + total) : (total + " icone");
});
</script>
</body>
</html>
